name: atualizar dashboard

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  testes:
    name: lint e testes
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: configurar python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: instalar dependencias
        run: pip install -r requirements.txt -e .

      - name: rodar ruff
        run: python -m ruff check src tests

      - name: rodar testes
        run: python -m pytest -v --cov=letterboxd --cov-report=term-missing

  atualizar:
    name: gerar stats.json
    runs-on: ubuntu-latest
    needs: testes

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: configurar python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: instalar dependencias
        run: pip install -r requirements.txt -e .

      - name: verificar watched.csv
        id: watched_csv
        shell: bash
        run: |
          if [ -f data/watched.csv ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "data/watched.csv nao encontrado; pulando geracao automatica."
          fi

      - name: gerar stats.json
        if: steps.watched_csv.outputs.exists == 'true'
        run: python -m letterboxd.stats_only

      - name: commit e push se houve mudanca
        if: steps.watched_csv.outputs.exists == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/stats.json
          git diff --cached --quiet || git commit -m "atualiza stats.json [bot]"
          git push
