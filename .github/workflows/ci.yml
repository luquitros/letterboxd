name: ci

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  secret-scan:
    name: secret scan
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: rodar gitleaks
        uses: gitleaks/gitleaks-action@v2

  test:
    name: lint e testes
    runs-on: ubuntu-latest
    needs: secret-scan

    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: configurar python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: instalar dependencias
        run: pip install -r requirements.txt -e .

      - name: validar sintaxe
        run: python -m py_compile src/main.py src/stats_only.py src/build_data.py src/build_site.py tests/*.py src/letterboxd/*.py

      - name: rodar ruff
        run: python -m ruff check src tests

      - name: rodar mypy
        run: python -m mypy

      - name: rodar testes
        run: python -m pytest -v --cov=letterboxd --cov-report=term-missing
