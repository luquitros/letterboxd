name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: lint e testes
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: configurar python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: instalar dependencias
        run: pip install -r requirements.txt -e .

      - name: validar sintaxe
        run: python -m py_compile src/main.py src/stats_only.py src/test_projeto.py src/letterboxd/*.py

      - name: rodar ruff
        run: python -m ruff check src

      - name: rodar testes
        run: python -m pytest src/test_projeto.py -v
